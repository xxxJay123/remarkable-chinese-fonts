<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>reMarkable 中文字體安裝工具</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface-hover: #1a1a1a;
      --border: #262626;
      --border-focus: #525252;
      --text: #e5e5e5;
      --text-dim: #737373;
      --accent: #f5f5f5;
      --green: #22c55e;
      --green-dim: #166534;
      --red: #ef4444;
      --amber: #f59e0b;
      --blue: #3b82f6;
      --radius: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      -webkit-app-region: drag;
      user-select: none;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 48px 28px 28px;
    }

    /* --- Header --- */
    .header {
      margin-bottom: 28px;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .header p {
      font-size: 13px;
      color: var(--text-dim);
      line-height: 1.5;
    }

    /* --- Form --- */
    .form-section {
      -webkit-app-region: no-drag;
    }

    .form-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .form-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .form-group label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
    }

    .form-group input:focus {
      border-color: var(--border-focus);
    }

    .form-group input::placeholder {
      color: #404040;
    }

    .connect-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      margin-bottom: 20px;
    }

    /* --- Connection Badge --- */
    .connection-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-dim);
      padding: 8px 0;
      min-height: 34px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-dim);
      flex-shrink: 0;
    }

    .status-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-dot.error { background: var(--red); }
    .status-dot.testing { background: var(--amber); animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* --- Buttons --- */
    button {
      -webkit-app-region: no-drag;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      padding: 10px 18px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    button:hover { background: var(--surface-hover); border-color: var(--border-focus); }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.3; cursor: not-allowed; }

    .btn-primary {
      background: var(--accent);
      color: #0a0a0a;
      border-color: var(--accent);
      font-weight: 600;
    }

    .btn-primary:hover { background: #fff; }
    .btn-primary:disabled { background: #404040; border-color: #404040; color: #737373; }

    /* --- Drop Zone --- */
    .drop-zone {
      -webkit-app-region: no-drag;
      flex: 1;
      min-height: 120px;
      border: 2px dashed var(--border);
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 14px;
      transition: all 0.2s;
      cursor: pointer;
      overflow-y: auto;
      padding: 16px;
    }

    .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(245, 245, 245, 0.03);
    }

    .drop-zone.has-files {
      align-items: flex-start;
      justify-content: flex-start;
    }

    .drop-icon {
      font-size: 36px;
      opacity: 0.25;
    }

    .drop-text {
      font-size: 14px;
      color: var(--text-dim);
    }

    .drop-hint {
      font-size: 11px;
      color: #404040;
    }

    /* --- File List --- */
    .file-item {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 8px 12px;
      background: var(--surface);
      border-radius: 8px;
      margin-bottom: 4px;
    }

    .file-icon { font-size: 16px; }

    .file-info {
      flex: 1;
      min-width: 0;
    }

    .file-name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-size {
      font-size: 11px;
      color: var(--text-dim);
    }

    .file-remove {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 16px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .file-remove:hover { color: var(--red); background: rgba(239, 68, 68, 0.1); }

    /* --- Install Button --- */
    .install-section {
      -webkit-app-region: no-drag;
    }

    .btn-install {
      width: 100%;
      padding: 14px;
      font-size: 15px;
      border-radius: 12px;
    }

    /* --- Log Panel --- */
    .log-panel {
      -webkit-app-region: no-drag;
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 14px;
      overflow-y: auto;
      font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.7;
      display: none;
    }

    .log-panel.visible { display: block; }

    .log-line { color: var(--text-dim); }
    .log-line.success { color: var(--green); }
    .log-line.error { color: var(--red); }
    .log-line.highlight { color: var(--accent); font-weight: 600; }

    /* --- Scrollbar --- */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #444; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>reMarkable 中文字體</h1>
      <p>拉字體檔案到下方，一鍵安裝到你嘅 reMarkable</p>
    </div>

    <div class="form-section">
      <div class="form-row">
        <div class="form-group" style="flex: 1.2;">
          <label>reMarkable IP</label>
          <input type="text" id="ip" placeholder="10.11.99.1" value="10.11.99.1">
        </div>
        <div class="form-group" style="flex: 1;">
          <label>SSH 密碼</label>
          <input type="password" id="password" placeholder="喺設定 → 關於搵到">
        </div>
      </div>
      <div class="connect-row">
        <button id="btn-test" onclick="testConnection()">測試連接</button>
        <div class="connection-status" id="conn-status">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text">未連接</span>
        </div>
      </div>
    </div>

    <div class="drop-zone" id="drop-zone" onclick="selectFiles()">
      <div class="drop-icon" id="drop-icon">字</div>
      <div class="drop-text">拖放字體檔案到呢度</div>
      <div class="drop-hint">支援 .ttf / .otf — 可以拉成個資料夾</div>
    </div>

    <div class="log-panel" id="log-panel"></div>

    <div class="install-section">
      <button class="btn-primary btn-install" id="btn-install" onclick="install()" disabled>
        安裝字體
      </button>
    </div>
  </div>

  <script>
    let fontFiles = [];
    let isConnected = false;
    let isInstalling = false;

    const $ = (id) => document.getElementById(id);

    // --- File Input (hidden) ---
    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.multiple = true;
    fileInput.accept = '.ttf,.otf';
    fileInput.style.display = 'none';
    document.body.appendChild(fileInput);

    fileInput.addEventListener('change', (e) => {
      addFiles(Array.from(e.target.files));
      fileInput.value = '';
    });

    function selectFiles() {
      if (!isInstalling) fileInput.click();
    }

    // --- Drag & Drop ---
    const dropZone = $('drop-zone');

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('drag-over');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');

      const items = e.dataTransfer.items;
      const files = [];

      for (let i = 0; i < items.length; i++) {
        const entry = items[i].webkitGetAsEntry?.();
        if (entry) {
          if (entry.isFile) {
            const file = e.dataTransfer.files[i];
            if (file.name.match(/\.(ttf|otf)$/i)) files.push(file);
          } else if (entry.isDirectory) {
            // For directory, we get files from dataTransfer
            // Note: recursive directory reading needs FileSystem API
            const file = e.dataTransfer.files[i];
            if (file && file.name.match(/\.(ttf|otf)$/i)) files.push(file);
          }
        } else {
          const file = e.dataTransfer.files[i];
          if (file && file.name.match(/\.(ttf|otf)$/i)) files.push(file);
        }
      }

      // Also check all files directly
      for (let i = 0; i < e.dataTransfer.files.length; i++) {
        const file = e.dataTransfer.files[i];
        if (file.name.match(/\.(ttf|otf)$/i) && !files.find(f => f.path === file.path)) {
          files.push(file);
        }
      }

      addFiles(files);
    });

    function addFiles(files) {
      for (const file of files) {
        if (!fontFiles.find(f => f.path === file.path)) {
          fontFiles.push(file);
        }
      }
      renderFiles();
      updateInstallButton();
    }

    function removeFile(index) {
      fontFiles.splice(index, 1);
      renderFiles();
      updateInstallButton();
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function renderFiles() {
      const zone = $('drop-zone');

      if (fontFiles.length === 0) {
        zone.classList.remove('has-files');
        zone.innerHTML = `
          <div class="drop-icon">字</div>
          <div class="drop-text">拖放字體檔案到呢度</div>
          <div class="drop-hint">支援 .ttf / .otf — 可以拉成個資料夾</div>
        `;
        return;
      }

      zone.classList.add('has-files');
      zone.innerHTML = fontFiles.map((f, i) => `
        <div class="file-item">
          <span class="file-icon">🔤</span>
          <div class="file-info">
            <div class="file-name">${f.name}</div>
            <div class="file-size">${formatSize(f.size)}</div>
          </div>
          <button class="file-remove" onclick="event.stopPropagation(); removeFile(${i})">✕</button>
        </div>
      `).join('');
    }

    // --- Connection ---
    async function testConnection() {
      const ip = $('ip').value.trim();
      const password = $('password').value;

      if (!ip || !password) {
        setStatus('error', '請輸入 IP 同密碼');
        return;
      }

      setStatus('testing', '連接中...');
      $('btn-test').disabled = true;

      const result = await window.api.testConnection({ ip, password });

      $('btn-test').disabled = false;

      if (result.success) {
        isConnected = true;
        setStatus('connected', `已連接 ${result.version || ''}`);
      } else {
        isConnected = false;
        setStatus('error', result.error || '連接失敗');
      }
      updateInstallButton();
    }

    function setStatus(state, text) {
      const dot = $('status-dot');
      const label = $('status-text');
      dot.className = 'status-dot ' + state;
      label.textContent = text;
    }

    // --- Install ---
    function updateInstallButton() {
      const btn = $('btn-install');
      btn.disabled = !isConnected || fontFiles.length === 0 || isInstalling;

      if (isInstalling) {
        btn.textContent = '安裝中...';
      } else if (fontFiles.length === 0) {
        btn.textContent = '安裝字體';
      } else {
        btn.textContent = `安裝 ${fontFiles.length} 個字體`;
      }
    }

    async function install() {
      if (!isConnected || fontFiles.length === 0 || isInstalling) return;

      isInstalling = true;
      updateInstallButton();

      // Show log panel, hide drop zone
      const logPanel = $('log-panel');
      logPanel.classList.add('visible');
      logPanel.innerHTML = '';
      $('drop-zone').style.display = 'none';

      // Listen for logs
      window.api.removeInstallLog();
      window.api.onInstallLog((msg) => {
        const line = document.createElement('div');
        line.className = 'log-line';
        if (msg.includes('✅') || msg.includes('🎉') || msg.includes('成功')) line.className += ' success';
        if (msg.includes('❌')) line.className += ' error';
        if (msg.includes('•')) line.className += ' highlight';
        line.textContent = msg;
        logPanel.appendChild(line);
        logPanel.scrollTop = logPanel.scrollHeight;
      });

      const ip = $('ip').value.trim();
      const password = $('password').value;
      const paths = fontFiles.map(f => f.path);

      const result = await window.api.installFonts({ ip, password, fontPaths: paths });

      isInstalling = false;

      if (result.success) {
        $('btn-install').textContent = '✅ 安裝完成';
        $('btn-install').disabled = true;
      } else {
        $('btn-install').textContent = '❌ 安裝失敗 — 重試';
        $('btn-install').disabled = false;
      }
    }

    // --- Init ---
    $('password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') testConnection();
    });
  </script>
</body>
</html>
